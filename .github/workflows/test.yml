name: .NET Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Debug repository structure
        run: |
          pwd
          ls -la
          find . -name "*.sln*" -o -name "*.csproj"

      - name: Restore
        run: dotnet restore PariSportifRepo.slnx

      - name: Build
        run: dotnet build PariSportifRepo.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test PariSportifRepo.slnx --no-build --configuration Release --logger "trx"

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/setup-dotnet@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      
      - name: Restore
        run: dotnet restore PariSportifRepo.slnx

      - name: Check formatting
        run: dotnet format PariSportifRepo.slnx --verify-no-changes

      - name: Build (with analyzers)
        run: dotnet build PariSportifRepo.slnx -warnaserror --configuration Release
      