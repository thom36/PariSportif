name: .NET Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0

      - name: Restore
        run: dotnet restore PariSportif/PariSportif.csproj

      - name: Build
        run: dotnet build PariSportif/PariSportif.csproj --no-restore

      - name: Test
        run: dotnet test PariSportif.tests/PariSportif.tests.csproj --no-build --logger "trx"